<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mugridge Studios</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>Mugridge Studios</header>

<nav>
  <button onclick="navigate('home')">Home</button>
  <button onclick="navigate('courses')">Courses</button>
  <button onclick="navigate('editor')">Code Editor</button>
</nav>

<div id="home" class="section active">
  <h2>Welcome to Mugridge Studios!</h2>
  <p>Your interactive coding platform. Learn, practice, and track your progress!</p>
  <div id="auth">
    <h3>Sign Up / Login</h3>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <p id="auth-msg"></p>
  </div>
</div>

<div id="courses" class="section">
  <h2>Courses</h2>
  <div class="course" onclick="selectCourse('JavaScript 101')">JavaScript 101</div>
  <div class="course" onclick="selectCourse('HTML & CSS')">HTML & CSS</div>
  <div class="course" onclick="selectCourse('Python Basics')">Python Basics</div>
</div>

<div id="editor" class="section">
  <h2>Code Editor</h2>
  <textarea id="code">console.log('Hello Mugridge Studios');</textarea>
  <button onclick="runCode()">Run Code</button>
  <pre id="output"></pre>
</div>

<script src="js/main.js"></script>
</body>
</html>
